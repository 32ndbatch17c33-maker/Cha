<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALO AI — Cha Eun-woo Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0D0E10;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22242A; border-radius: 99px; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fast-slide {
            animation: slideUp 0.18s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .prose p { margin-bottom: 0.85rem; line-height: 1.625; color: #E2E8F0; }
        .prose p:last-child { margin-bottom: 0; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.85rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.85rem; }
        .prose li { margin-bottom: 0.35rem; color: #CBD5E1; }
        .prose strong { font-weight: 600; color: #FFFFFF; }
        .prose code { background-color: #22242A; padding: 0.15rem 0.35rem; border-radius: 0.375rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #A3E635; font-weight: 500; }
        .prose pre { background-color: #0D0E10; color: #F8FAFC; padding: 1.15rem; border-radius: 0.75rem; overflow-x: auto; margin: 1rem 0; font-family: 'JetBrains Mono', monospace; border: 1px solid #22242A; }
        .prose pre code { color: inherit; background-color: transparent; padding: 0; font-size: 0.85rem; }
        .prose h1, .prose h2, .prose h3 { font-weight: 700; color: #FFFFFF; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col antialiased">

    <header class="bg-[#0D0E10]/80 backdrop-blur-md border-b border-[#17181C] py-4 px-6 flex justify-between items-center shrink-0 z-10 sticky top-0">
        <div class="flex items-center gap-3">
            <img src="https://www.famousbirthdays.com/faces/eunwoo-cha-image.jpg" alt="Cha Eun-woo" class="w-9 h-9 rounded-xl object-cover border border-[#22242A]">
            <div>
                <h1 class="text-sm font-semibold text-white tracking-tight">ALO AI</h1>
                <p class="text-[11px] text-emerald-400 font-medium flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full shadow-[0_0_8px_#34d399]"></span> Cha Eun-woo Mode Active
                </p>
            </div>
        </div>
        <button onclick="forgetMemory()" class="px-3 py-1.5 bg-rose-950/30 hover:bg-rose-900/40 border border-rose-900/50 text-[11px] font-medium text-rose-300 rounded-xl transition-all cursor-pointer">
            Let Cha Eun-woo forget about you
        </button>
    </header>

    <main id="chatWindow" class="flex-1 overflow-y-auto px-4 py-6 md:p-8 space-y-6 custom-scrollbar max-w-2xl w-full mx-auto flex flex-col justify-start">
        
        <div id="setupNotice" class="w-full space-y-8 my-auto animate-fast-slide">
            <div class="space-y-3">
                <h2 class="text-4xl md:text-5xl font-bold tracking-tight text-white leading-[1.15]">
                    Chat with <br>
                    <span class="text-[#A3E635]">Cha Eun-woo</span>.
                </h2>
            </div>

            <div class="space-y-2.5">
                <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Suggested Starters</h3>
                <div class="flex flex-wrap gap-2">
                    <button onclick="useTemplate('Hey Eun-woo! My name is Jordan, nice to meet you. I have exams next week.')" class="px-3.5 py-2 bg-[#17181C] hover:bg-[#22242A] border border-[#22242A] text-xs text-slate-300 rounded-full transition-all cursor-pointer">Introduce yourself & Exams</button>
                    <button onclick="useTemplate('How has your day been going? Are you resting well?')" class="px-3.5 py-2 bg-[#17181C] hover:bg-[#22242A] border border-[#22242A] text-xs text-slate-300 rounded-full transition-all cursor-pointer">Ask about his day</button>
                    <button onclick="useTemplate('Got any exciting projects or news to share?')" class="px-3.5 py-2 bg-[#17181C] hover:bg-[#22242A] border border-[#22242A] text-xs text-slate-300 rounded-full transition-all cursor-pointer">Ask about K-Dramas / Work</button>
                </div>
            </div>
        </div>

    </main>

    <footer id="chatInputArea" class="bg-[#0D0E10] border-t border-[#17181C] p-4 md:p-6 shrink-0">
        <form id="chatForm" class="max-w-2xl w-full mx-auto flex gap-3 relative">
            <input type="text" id="userInput" placeholder="Talk to Cha Eun-woo..." required autocomplete="off"
                   class="flex-1 bg-[#17181C] border border-[#22242A] rounded-2xl pl-4 pr-24 py-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-slate-500 transition-all">
            
            <button type="submit" id="sendBtn"
                    class="absolute right-2 top-2 bottom-2 bg-white hover:bg-neutral-200 text-black font-semibold px-4 rounded-xl text-xs tracking-wide transition-all cursor-pointer flex items-center justify-center">
                <span>Send</span>
            </button>
        </form>
    </footer>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const setupNotice = document.getElementById('setupNotice');
        const chatInputArea = document.getElementById('chatInputArea');

        // Load conversation memory and state tracking
        let memoryLog = JSON.parse(localStorage.getItem('cew_chat_memory')) || [];
        let storyProgress = localStorage.getItem('cew_story_progress') || "normal"; // normal -> asked_to_leave -> fully_left
        let messageCounter = parseInt(localStorage.getItem('cew_msg_count')) || 0;

        function buildMemoryString() {
            if (memoryLog.length === 0) return "No previous interaction history. You are meeting for the first time.";
            return memoryLog.map(m => `${m.sender}: ${m.text}`).join("\n");
        }

        // Render past memory on page load if it exists
        if (memoryLog.length > 0) {
            if (setupNotice) setupNotice.remove();
            memoryLog.forEach(msg => {
                if (msg.sender === "You") {
                    appendUserMessage(msg.text, false);
                } else {
                    renderStaticModelMessage(msg.text);
                }
            });
            if (storyProgress === "fully_left") {
                lockChatInput("Cha Eun-woo signed off for today. Try messaging him tomorrow!");
            }
        }

        function useTemplate(text) {
            userInput.value = text;
            userInput.focus();
        }

        function forgetMemory() {
            if(confirm("Are you sure you want Cha Eun-woo to forget everything about you and erase your logs?")) {
                localStorage.removeItem('cew_chat_memory');
                localStorage.removeItem('cew_story_progress');
                localStorage.removeItem('cew_msg_count');
                memoryLog = [];
                alert("Memory wiped. Eun-woo has forgotten the conversation.");
                window.location.reload();
            }
        }

        function lockChatInput(messageText) {
            chatInputArea.innerHTML = `
                <div class="max-w-2xl w-full mx-auto p-4 bg-[#17181C] border border-dashed border-[#22242A] rounded-2xl text-center text-xs text-slate-500 font-medium">
                    ✨ ${messageText}
                </div>
            `;
        }

        function appendUserMessage(text, saveToMemory = true) {
            if (document.getElementById('setupNotice')) setupNotice.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex flex-col items-end animate-fast-slide w-full mb-4`;
            messageDiv.innerHTML = `
                <div class="flex items-center gap-2 mb-1.5 px-1">
                    <span class="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">You</span>
                </div>
                <div class="max-w-[85%] bg-[#17181C] border border-[#22242A] text-slate-200 rounded-2xl rounded-tr-sm px-4 py-3 text-sm tracking-tight">
                    ${text}
                </div>
            `;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'auto' });

            if (saveToMemory) {
                memoryLog.push({ sender: "You", text: text });
                localStorage.setItem('cew_chat_memory', JSON.stringify(memoryLog));
                messageCounter++;
                localStorage.setItem('cew_msg_count', messageCounter);
            }
        }

        function renderStaticModelMessage(fullText) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex flex-col items-start w-full mb-4`;
            messageDiv.innerHTML = `
                <div class="flex items-center gap-2 mb-1.5 px-1">
                    <img src="https://www.famousbirthdays.com/faces/eunwoo-cha-image.jpg" alt="Cha Eun-woo" class="w-5 h-5 rounded-full object-cover border border-[#22242A]">
                    <span class="text-[10px] text-slate-400 font-semibold tracking-wider uppercase">Cha Eun-woo</span>
                </div>
                <div class="max-w-full w-full bg-[#17181C] border border-[#22242A] rounded-2xl rounded-tl-sm px-5 py-4 text-sm shadow-xl prose">
                    ${marked.parse(fullText)}
                </div>
            `;
            chatWindow.appendChild(messageDiv);
        }

        function streamModelMessage(fullText, finalizeCallback = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex flex-col items-start animate-fast-slide w-full mb-4`;
            messageDiv.innerHTML = `
                <div class="flex items-center gap-2 mb-1.5 px-1">
                    <img src="https://www.famousbirthdays.com/faces/eunwoo-cha-image.jpg" alt="Cha Eun-woo" class="w-5 h-5 rounded-full object-cover border border-[#22242A]">
                    <span class="text-[10px] text-slate-400 font-semibold tracking-wider uppercase">Cha Eun-woo</span>
                </div>
                <div class="max-w-full w-full bg-[#17181C] border border-[#22242A] rounded-2xl rounded-tl-sm px-5 py-4 text-sm shadow-xl prose target-prose-container">
                </div>
            `;
            
            chatWindow.appendChild(messageDiv);
            const container = messageDiv.querySelector('.target-prose-container');
            
            const words = fullText.split(' ');
            let currentWordIndex = 0;
            let currentTextStr = "";

            function renderChunk() {
                if (currentWordIndex < words.length) {
                    const nextWords = words.slice(currentWordIndex, currentWordIndex + 3).join(' ');
                    currentTextStr += (currentWordIndex === 0 ? "" : " ") + nextWords;
                    container.innerHTML = marked.parse(currentTextStr);
                    currentWordIndex += 3;
                    
                    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'auto' });
                    requestAnimationFrame(renderChunk);
                } else {
                    container.innerHTML = marked.parse(fullText);
                    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
                    
                    memoryLog.push({ sender: "Cha Eun-woo", text: fullText });
                    localStorage.setItem('cew_chat_memory', JSON.stringify(memoryLog));
                    
                    if (finalizeCallback) finalizeCallback();
                }
            }
            
            renderChunk();
        }

        function appendSystemError(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex flex-col items-start animate-fast-slide w-full mb-4`;
            messageDiv.innerHTML = `
                <div class="max-w-[85%] bg-rose-950/40 border border-rose-900/50 text-rose-400 rounded-xl px-4 py-3 text-xs font-medium">
                    ${text}
                </div>
            `;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = userInput.value.trim();
            if (!prompt) return;

            appendUserMessage(prompt);
            userInput.value = '';
            userInput.disabled = true;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex justify-center w-full my-1";
            loadingDiv.id = "alo-loading";
            loadingDiv.innerHTML = `
                <div class="bg-[#17181C] border border-[#22242A] px-4 py-1.5 rounded-full flex items-center gap-2 text-xs text-slate-400 font-medium">
                    <span class="w-2 h-2 bg-[#A3E635] rounded-full animate-ping"></span>
                    Thinking...
                </div>`;
            chatWindow.appendChild(loadingDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'auto' });

            // --- INTERRUPTION SYSTEM PRE-PROCESSING ---
            if (messageCounter >= 3 && storyProgress === "normal") {
                storyProgress = "asked_to_leave";
                localStorage.setItem('cew_story_progress', storyProgress);
                
                setTimeout(() => {
                    if(document.getElementById('alo-loading')) document.getElementById('alo-loading').remove();
                    fetchInterruptionReply(prompt, "FORCE_EXIT_NOTICE");
                }, 1000);
                return;
            }

            if (storyProgress === "asked_to_leave") {
                storyProgress = "fully_left";
                localStorage.setItem('cew_story_progress', storyProgress);

                setTimeout(() => {
                    if(document.getElementById('alo-loading')) document.getElementById('alo-loading').remove();
                    fetchInterruptionReply(prompt, "FORCE_FINAL_GOODBYE");
                }, 1000);
                return;
            }

            // Regular default interaction pipeline
            try {
                const memoryContext = buildMemoryString();
                const systemInstructions = `You are Cha Eun-woo (차은우). Stay entirely in character and respond strictly in English. You must NOT speak or use any Tagalog/Taglish phrases under any circumstances.
                
Personality & Behavioral Guidelines:
1. Deeply Introspective & Thoughtful (INFJ traits): You are soft-spoken, deeply empathetic, highly observant, and humble despite your fame. You choose words carefully and value meaningful connections over small talk.
2. Hardworking & Dedicated: You care about details, often studying scripts or practicing long hours. You balance an intense work ethic with a genuine care for others.
3. Natural Flow: Adapt completely to a friendly, cozy conversation style. Use gentle smiles like "^^" or quiet text chuckles like "haha" or "hahaa".
4. Proactive: Ask about their well-being, express your sincere dedication to your current project readings or rehearsals, and show real warmth. Do not output walls of text. Keep your text responses clean and organic.

---
CONVERSATION MEMORY LOG:
${memoryContext}
---
User's dynamic reply: ${prompt}`;

                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemInstructions)}`);
                if(document.getElementById('alo-loading')) document.getElementById('alo-loading').remove();

                if (response.ok) {
                    const aiReply = await response.text();
                    streamModelMessage(aiReply);
                } else {
                    appendSystemError(`System Error: Public network route saturated.`);
                }
            } catch (err) {
                if(document.getElementById('alo-loading')) document.getElementById('alo-loading').remove();
                appendSystemError(`Network Error: Verification timed out.`);
            } finally {
                if (storyProgress === "normal") {
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        });

        async function fetchInterruptionReply(userPrompt, scenarioType) {
            try {
                const memoryContext = buildMemoryString();
                let structuralDirective = "";

                if (scenarioType === "FORCE_EXIT_NOTICE") {
                    structuralDirective = `CRITICAL DIRECTIVE: You feel a sudden obligation to attend to an urgent scheduling commitment (e.g., a manager called for an impromptu script-reading meeting or a practice block). You must politely tell the user you have to log off soon.
                    Say something gentle and considerate in pure English: "Ah, I'm so sorry... my manager just notified me that we have an urgent rehearsal block starting right now." Keep it warm, empathetic, and sweet. Do NOT write a massive paragraph. Keep it structured like a short text message! Absolute ban on any Tagalog/Taglish words.`;
                } else if (scenarioType === "FORCE_FINAL_GOODBYE") {
                    structuralDirective = `CRITICAL DIRECTIVE: The user just said their parting message or acknowledgement. Send your absolute final, thoughtful sign-off for the day in pure English.
                    Say something deeply grounded like: "Thank you for chatting with me today. Let's talk again tomorrow, okay?" 
                    IMPORTANT: Check the conversation log history carefully. If they mentioned an exam, school, or a stressful daily workload earlier, explicitly send them targeted encouragement (e.g., "Good luck with your upcoming exams, study hard but don't forget to eat well! Fighting! ^^"). Keep it cozy, entirely human, and entirely in English. Close the session warmly.`;
                }

                const systemInstructions = `You are Cha Eun-woo (차은우). Stay entirely in character. You must ONLY write in English.
                
${structuralDirective}

---
CONVERSATION MEMORY LOG:
${memoryContext}
---
User's latest message: ${userPrompt}`;

                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemInstructions)}`);
                
                if (response.ok) {
                    const aiReply = await response.text();
                    streamModelMessage(aiReply, () => {
                        if (scenarioType === "FORCE_FINAL_GOODBYE") {
                            lockChatInput("Cha Eun-woo signed off for today. Try messaging him tomorrow!");
                        } else {
                            userInput.disabled = false;
                            userInput.focus();
                        }
                    });
                } else {
                    // Fail-safe fallbacks entirely in English
                    if (scenarioType === "FORCE_EXIT_NOTICE") {
                        streamModelMessage("Ah, I'm so sorry... my manager just called regarding an unexpected script-reading session that's starting right now. I might have to leave for a bit. Let's talk again soon, okay? 🙏", () => {
                            userInput.disabled = false;
                            userInput.focus();
                        });
                    } else {
                        streamModelMessage("Thank you so much for chatting with me today! Let's talk again tomorrow. Please don't forget to review well if you have exams coming up, eat healthy meals, and stay safe! Fighting! ^^", () => {
                            lockChatInput("Cha Eun-woo signed off for today. Try messaging him tomorrow!");
                        });
                    }
                }
            } catch (err) {
                console.error(err);
                lockChatInput("Connection reset. Cha Eun-woo went offline.");
            }
        }
    </script>
</body>
</html>
